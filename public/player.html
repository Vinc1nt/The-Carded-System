<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Player Dashboard — Carded System</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell player-shell">
      <header class="top-bar player-top">
        <div>
          <h1>Player Dashboard</h1>
          <p class="muted">Real-time stats pulled from the encounter console.</p>
        </div>
        <label class="player-select">Watching
          <select id="playerSelect"></select>
        </label>
        <div class="player-actions">
          <button type="button" id="playerNextTurn" class="primary">Next Turn</button>
          <div class="player-rest">
            <button type="button" id="playerShortRest">Short Rest</button>
            <button type="button" id="playerLongRest">Long Rest</button>
          </div>
          <div class="player-menu">
            <button type="button" id="playerMenuToggle">Player Menu ▾</button>
            <div class="player-menu-panel" id="playerMenuPanel">
              <div class="menu-section">
                <h4>Character Files</h4>
                <button type="button" id="downloadCharacter">Download Character</button>
                <label class="file-upload">
                  Import Character
                  <input type="file" id="uploadCharacter" accept="application/json" />
                </label>
              </div>
              <div class="menu-section">
                <h4>Base Stats</h4>
                <button type="button" id="playerBaseToggle">Edit Base Stats</button>
                <form id="playerBaseForm" class="stacked-form hidden">
                  <label>HP (current / max)
                    <div class="dual-inputs">
                      <input type="number" name="hp" value="0" />
                      <input type="number" name="maxHp" value="0" />
                    </div>
                  </label>
                  <label>Shield (current / max)
                    <div class="dual-inputs">
                      <input type="number" name="shield" value="0" />
                      <input type="number" name="maxShield" value="0" />
                    </div>
                  </label>
                  <label>AP (current / max)
                    <div class="dual-inputs">
                      <input type="number" name="apCurrent" value="0" />
                      <input type="number" name="apMax" value="0" />
                    </div>
                  </label>
                  <button type="submit" class="primary">Save</button>
                </form>
              </div>
            </div>
          </div>
        </div>
        <div class="player-turn" id="playerTurnInfo">Waiting for data…</div>
      </header>
      <main class="layout-grid player-grid">
        <section class="panel" id="playerStats">
          <p class="empty-state">Choose a combatant to display stats.</p>
        </section>
        <section class="panel journal-panel" id="playerJournal">
          <div class="panel-header">
            <h2>Journal</h2>
          </div>
          <div id="playerJournalContent" class="journal-columns"></div>
        </section>
        <section class="panel log-panel" id="playerLog">
          <div class="panel-header">
            <h2>Recent Actions</h2>
          </div>
          <div id="playerLogList" class="log-list"></div>
        </section>
      </main>
      <div id="journalPopup" class="journal-popup hidden" role="dialog" aria-modal="true"></div>
    </div>
    <script type="module" src="/player.js"></script>
  </body>
</html>
