<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Player Dashboard — Carded System</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell player-shell">
      <header class="top-bar player-top">
        <div>
          <h1>Player Dashboard</h1>
          <p class="muted">Real-time stats pulled from the encounter console.</p>
        </div>
        <label class="player-select">Watching
          <select id="playerSelect"></select>
        </label>
        <div class="player-tools">
          <button type="button" id="downloadCharacter">Download Character</button>
          <label class="file-upload">
            Import Character
            <input type="file" id="uploadCharacter" accept="application/json" />
          </label>
        </div>
        <div class="player-turn" id="playerTurnInfo">Waiting for data…</div>
      </header>
      <main class="layout-grid player-grid">
        <section class="panel" id="playerStats">
          <p class="empty-state">Choose a combatant to display stats.</p>
        </section>
        <section class="panel" id="playerCards">
          <h2>Cards & Loadout</h2>
          <div id="playerCardList" class="card-list empty-state">Cards for the selected combatant will show here.</div>
          <div class="player-section">
            <details id="playerCardDrawer">
              <summary>Add Card</summary>
              <form id="playerCardForm" class="stacked-form">
                <div class="form-row">
                  <label>Name
                    <input type="text" name="name" required />
                  </label>
                  <label>Set
                    <input type="text" name="set" placeholder="Machine" />
                  </label>
                  <label>Type
                    <input type="text" name="type" placeholder="Attack" />
                  </label>
                </div>
                <div class="form-row">
                  <label>AP Cost
                    <input type="number" name="apCost" value="2" />
                  </label>
                  <label>Range
                    <input type="number" name="range" value="5" />
                  </label>
                  <label>Max HP Bonus
                    <input type="number" name="modMaxHp" value="0" />
                  </label>
                </div>
                <div class="form-row">
                  <label>Max Shield Bonus
                    <input type="number" name="modMaxShield" value="0" />
                  </label>
                  <label>AP Max Bonus
                    <input type="number" name="modApMax" value="0" />
                  </label>
                  <label>Guard Bonus
                    <input type="number" name="modGuard" value="0" />
                  </label>
                </div>
                <label>Damage Bonus
                  <input type="number" name="modDamage" value="0" />
                </label>
                <label>Tags
                  <input type="text" name="tags" placeholder="Melee, Shield" />
                </label>
                <label>Effect
                  <textarea name="effect" rows="2" placeholder="Describe the effect"></textarea>
                </label>
                <button type="submit">Add Card</button>
              </form>
            </details>
          </div>
          <div class="player-section">
            <h3>Relics & Artifacts</h3>
            <div id="playerRelicList" class="relic-list empty-state">No relics yet.</div>
            <form id="playerRelicForm" class="stacked-form">
              <div class="form-row">
                <label>Name
                  <input type="text" name="name" required />
                </label>
                <label>HP Bonus
                  <input type="number" name="hp" value="0" />
                </label>
                <label>AP Bonus
                  <input type="number" name="ap" value="0" />
                </label>
              </div>
              <div class="form-row">
                <label>Ability Focus
                  <input type="text" name="ability" placeholder="Machine, Shield, etc." />
                </label>
                <label>Description
                  <input type="text" name="description" placeholder="What does it do?" />
                </label>
              </div>
              <button type="submit">Add Relic</button>
            </form>
          </div>
        </section>
        <section class="panel log-panel" id="playerLog">
          <div class="panel-header">
            <h2>Recent Actions</h2>
          </div>
          <div id="playerLogList" class="log-list"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/player.js"></script>
  </body>
</html>
