<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Carded System — Encounter Console</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div class="encounter-meta">
          <div class="meta-label">Round</div>
          <div class="meta-value" data-round>1</div>
          <div class="meta-label">Combatants</div>
          <div class="meta-value" data-count>0</div>
        </div>
        <div class="turn-controls">
          <button type="button" id="startEncounter">Start Encounter</button>
          <button type="button" id="prevTurn">Prev Turn</button>
          <button type="button" class="primary" id="nextTurn">Next Turn</button>
        </div>
        <div class="header-actions">
          <button type="button" id="toggleAddForm">Add Combatant</button>
          <div class="rest-all">
            <button type="button" id="restAllShort">Short Rest All</button>
            <button type="button" id="restAllLong">Long Rest All</button>
          </div>
          <div class="gm-menu">
            <button type="button" id="gmMenuToggle">Encounter Menu ▾</button>
            <div class="gm-menu-panel" id="gmMenuPanel">
              <button type="button" id="downloadEncounter">Download Encounter</button>
              <label class="file-upload">
                Import Encounter
                <input type="file" id="uploadEncounter" accept="application/json" />
              </label>
            </div>
          </div>
          <a href="/player?create=1" target="_blank" rel="noopener noreferrer">New Character Sheet</a>
          <a href="/player" target="_blank" rel="noopener noreferrer">Open Player Dashboard</a>
        </div>
      </header>
      <main class="main-grid">
        <aside class="turn-column">
          <section class="panel">
            <div class="panel-header">
              <h2>Turn Order</h2>
              <button type="button" id="refreshState">Refresh</button>
            </div>
          <div id="turnList" class="turn-list empty-state">No combatants yet.</div>
          <div id="addDrawer" class="drawer">
            <form id="addParticipantForm" class="stacked-form">
              <h3>Add Combatant</h3>
                <div class="form-row">
                  <label>Name
                    <input name="name" type="text" placeholder="Bladewalker" required />
                  </label>
                  <label>Initiative
                    <input name="initiative" type="number" value="0" />
                  </label>
                </div>
                <div class="form-row">
                  <label>Base HP
                    <input name="maxHp" type="number" value="20" />
                  </label>
                  <label>Base Shield
                    <input name="maxShield" type="number" value="0" />
                  </label>
                </div>
                <div class="form-row">
                  <label>Base AP
                    <input name="apMax" type="number" value="6" />
                  </label>
                  <label>Set Focus
                    <input name="setFocus" type="text" placeholder="Elemental" />
                  </label>
                </div>
                <button type="submit" class="primary">Add Combatant</button>
            </form>
          </div>
        </section>
        </aside>
        <section class="detail-column">
          <div id="detailPanel" class="panel detail-panel empty-state">
            Select a combatant to manage their turn, automation, and cards.
          </div>
          <section class="panel log-panel">
            <div class="panel-header collapsible">
              <h2>Action Log</h2>
              <button type="button" id="toggleLog">Hide</button>
            </div>
            <div id="logList" class="log-list"></div>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
